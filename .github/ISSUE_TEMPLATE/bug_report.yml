name: Bug report
description: Report a reproducible problem in LlamaDeck
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve LlamaDeck. Do not include secrets, private model URLs, or tokens.
  - type: input
    id: version
    attributes:
      label: LlamaDeck version
      placeholder: v0.1.0 or commit hash
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues first.
          required: true
        - label: This problem is in LlamaDeck, not an upstream llama.cpp or llama-swap issue.
          required: true
