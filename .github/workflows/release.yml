name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix
        required: true
        default: 0.1.0

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  package:
    name: Package ${{ matrix.asset }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            asset: linux-x64
            archive: tar
          - os: windows-latest
            rid: win-x64
            asset: windows-x64
            archive: zip
          - os: macos-14
            rid: osx-arm64
            asset: macos-arm64
            archive: mac
          - os: macos-14
            rid: osx-x64
            asset: macos-x64
            archive: mac

    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish Linux
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          dotnet publish LlamaSwapManager.Desktop/LlamaSwapManager.Desktop.csproj \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --self-contained true \
            -p:Version="${{ steps.version.outputs.version }}" \
            --output artifacts/publish
          mkdir -p artifacts/package
          tar -C artifacts/publish -czf "artifacts/package/LlamaDeck-${{ steps.version.outputs.version }}-${{ matrix.asset }}.tar.gz" .

      - name: Publish Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          dotnet publish LlamaSwapManager.Desktop/LlamaSwapManager.Desktop.csproj `
            --configuration Release `
            --runtime "${{ matrix.rid }}" `
            --self-contained true `
            -p:Version="${{ steps.version.outputs.version }}" `
            --output artifacts/publish
          New-Item -ItemType Directory -Force artifacts/package | Out-Null
          Compress-Archive -Path artifacts/publish/* -DestinationPath "artifacts/package/LlamaDeck-${{ steps.version.outputs.version }}-${{ matrix.asset }}.zip"

      - name: Package macOS app
        if: matrix.archive == 'mac'
        shell: bash
        run: |
          bash scripts/package-release-macos.sh \
            "${{ matrix.rid }}" \
            "${{ steps.version.outputs.version }}" \
            "artifacts/package"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: LlamaDeck-${{ matrix.asset }}
          path: artifacts/package/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
